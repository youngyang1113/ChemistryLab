<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Virtual Chemistry Lab</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-zinc-950 text-zinc-100 antialiased overflow-hidden">
    <div id="root">
      <div id="fallback" style="display:flex;align-items:center;justify-content:center;height:100vh;color:#a1a1aa;font-family:sans-serif;font-size:14px;flex-direction:column;gap:8px;text-align:center;padding:20px">
        <div>Loading AI Virtual Chemistry Lab...</div>
        <div id="load-error" style="display:none;color:#ef4444;font-size:12px;max-width:400px"></div>
      </div>
    </div>
    <script>
      // Detect if app failed to render (fallback for file:// protocol ES module restrictions)
      setTimeout(function(){
        var root = document.getElementById('root');
        if (root && root.children.length === 1 && root.children[0].id === 'fallback') {
          var err = document.getElementById('load-error');
          if (err) {
            err.style.display = 'block';
            err.textContent = 'App failed to load. Please serve the files via a web server instead of opening directly.\n\nRun: npm run dev   or   npx serve dist';
          }
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
